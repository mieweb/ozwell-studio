worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Shared map: upgrade WebSocket connections when requested
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Port 80 — User application (proxy to localhost:3000) ──
    server {
        listen 80 default_server;

        add_header Content-Security-Policy "frame-ancestors *" always;

        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 86400;
        }
    }

    # ── Port 5000 — Workspace frontend (static files) ────────
    server {
        listen 5000;

        root /opt/ozwell-studio/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ── Port 7681 — ttyd (proxy to TCP loopback) ───────────────
    server {
        listen 7681;

        add_header Content-Security-Policy "frame-ancestors *" always;

        location / {
            proxy_pass         http://127.0.0.1:7682;
            proxy_http_version 1.1;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 86400;
        }
    }

    # ── Port 8080 — code-server (proxy to TCP loopback) ──────
    server {
        listen 8080;

        add_header Content-Security-Policy "frame-ancestors *" always;

        location / {
            proxy_pass         http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 86400;
        }
    }
}
