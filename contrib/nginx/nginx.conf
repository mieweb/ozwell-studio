map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 5000;

    # Dashboard (static files)
    root /opt/ozwell-studio/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ttyd (base-path aware)
    location /ttyd/ {
        proxy_pass         http://127.0.0.1:7681;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # code-server (strip /code prefix)
    location /code/ {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # MCP proxy (strip /mcp prefix)
    location /mcp/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_read_timeout 86400;
    }

    # User application preview (strip /preview prefix)
    location /preview/ {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 86400;
        error_page 502 =200 /getting-started.html;
    }

    location = /getting-started.html {
        root /opt/ozwell-studio;
        internal;
    }
}
