# Mouse support (hold Shift to select text for browser copy/paste)
set -g mouse on

# Generous scrollback
set -g history-limit 50000

# Modern terminal features
set -g default-terminal "tmux-256color"

# Reduce escape delay for snappier key response
set -g escape-time 10

# Pass focus events to applications (e.g. vim)
set -g focus-events on
